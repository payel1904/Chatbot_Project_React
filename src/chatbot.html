<!DOCTYPE html>
<html>

<head>
  <title>chatbot</title>
</head>
<style>
  body{
    font-family:Arial;
  }
  .welcome-message{
    text-align:center;
    margin-top:20px;
    color:rgb(4, 74, 41);
  }
  .send-button {
    background-color:rgb(25,135,84);
    color:white;
    padding:12px 20px;
    margin-left:12px;
    border:none;
    border-radius:10px;
    font-size:15px;  
    cursor:pointer;
  }
  .chat-input{
    padding:12px 15px;
    border-radius:10px;
    border-width:1px;
    font-size:15px;
    flex-grow:1;
    
  }
  .chat-input-container{
    display:flex;
    margin-bottom:60px;
   
  }
  .App-container{
    max-width:600px;
    margin-left: auto;
    margin-right:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
  }
  .chat-message-user{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    
  }
  .chat-message-robot{
    display:flex;
    justify-content:flex-start;
    align-items:center;
  }
  .chat-message-text{
    background-color: rgb(238,238,238);
    border-radius:10px;
    padding:12px 15px;
    max-width:300px;
    margin:10px 10px 10px 10px;
  }
  .chat-message-icon{
    width: 45px;
    
  }
  .chat-messages-container{
      flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
  }
</style>

<body>
  <div class="js-container"></div>
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">
    function WelcomeMessage(){
      return(
        <h2 className="welcome-message">Welcome to Chatbot</h2>
      );
    }
      
    function ChatInput({ chatMessages, setChatMessages }) {
     const [inputText,setInputText]= React.useState('');
      function SaveInputText(event){
        setInputText(event.target.value);
      }
      function SendMessage(){
        const newChatMessages=[...chatMessages, 
        {
          message:inputText,
          sender:'user',
          id:crypto.randomUUID()
        }];
        setChatMessages(newChatMessages);
        const response = Chatbot.getResponse(inputText);
        setChatMessages([...newChatMessages, 
        {
          message:response,
          sender:'robot',
          id:crypto.randomUUID()
        }]);
       
        setInputText('');
      }
      return (
        <div className="chat-input-container">
          <input
            placeholder="Type a message to chatbot"
            size="30"
            onChange={SaveInputText}
            value={inputText}
            className="chat-input"
          />
          <button onClick={SendMessage} className="send-button">Send</button>
        </div>
      );
    }
    function ChatMessage({ message, sender }) {
      // const message = props.message;
      // const sender = props.sender;
      // const {message, sender}=props;//destructuring 
      /* if (sender === "robot") {

        return (
          <div>
            <img src="robot.png" width="50" height="50" />
            {message}
          </div>
        );
      } */

      return (
        <div  className={
          sender==='user'? 
          "chat-message-user":
          "chat-message-robot"
        }>
          {sender === 'robot' && (
            <img src="robot.png" className="chat-message-icon"/>)
          }
          <div className="chat-message-text">
          {message}
          </div>
          {sender === 'user' && (
            <img src="user.png" className="chat-message-icon"/>)
          }
        </div>
      );
    }
    function ChatMessages({ chatMessages }) {
      const chatMessagesRef = React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);
      return (<div className="chat-messages-container" ref={chatMessagesRef}>
        {
          chatMessages.map(
            (chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            }
          )
        }
      </div>
      );
    }
    function App() {
       const [chatMessages, setChatMessages]=React.useState([]);

        /* [
        {
          message: "Hello, Chatbot!",
          sender: "user",
          id: 'id1'
        },
        {
          message: "Hello,how can I help you?",
          sender: "robot",
          id: 'id2'
        },
        {
          message: "What is the date today?",
          sender: "user",
          id: 'id3'
        },
        {
          message: "Today is may 26",
          sender: "robot",
          id: 'id4'
        }
      ] */
      
      // const chatMessages=array[0];
      //`const setChatMessages=array[1];
      
      return (
        <div className="App-container">
          <WelcomeMessage/>
         
          <ChatMessages
            chatMessages={chatMessages}
          />
           <ChatInput 
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}
          />

        </div>

      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
  </script>
</body>
</html>
